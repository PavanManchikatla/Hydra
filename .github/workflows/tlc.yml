name: TLC

# The TLA+ model-checking gate (BLUEPRINT §4.3), offloaded to CI because model checking to
# fixpoint is thermally infeasible on the owner's laptop (PROJECT_STATE §9).
#
#  - `smoke`  : fast, required on every push/PR touching the model or hydra-state — parse +
#               the two invariant mutations (Mut2, Mut4) + a bounded baseline-safety smoke. < 10 min.
#  - `long`   : manual / weekly — baseline-safety→fixpoint, baseline-liveness, Mut1, Mut3, each
#               checkpointed; the checkpoint dir is uploaded at the ~6h job boundary and resumed
#               via `-recover` on the next dispatch (set input `recover=true`) until complete.

on:
  push:
    paths: ['verification/**', 'crates/hydra-state/**', '.github/workflows/tlc.yml']
  pull_request:
    paths: ['verification/**', 'crates/hydra-state/**']
  workflow_dispatch:
    inputs:
      recover:
        description: 'Long run: resume from a prior run''s checkpoint artifact (set run_id too)'
        type: boolean
        default: false
      run_id:
        description: 'Source run-id whose tlc-checkpoint-* artifacts to resume (with recover=true). Empty = this run.'
        type: string
        default: ''
  schedule:
    - cron: '0 6 * * 1'   # weekly Monday 06:00 UTC — kicks the long job

env:
  TLA_URL: https://github.com/tlaplus/tlaplus/releases/download/v1.7.4/tla2tools.jar
  TLA_SHA256: 936a262061c914694dfd669a543be24573c45d5aa0ff20a8b96b23d01e050e88

jobs:
  # ---------- fast, required ----------
  smoke:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - name: Fetch + verify tla2tools.jar (pinned v1.7.4)
        working-directory: verification
        run: |
          curl -sSL -o tla2tools.jar "$TLA_URL"
          echo "$TLA_SHA256  tla2tools.jar" | sha256sum -c -
      - name: Parse check (SANY)
        working-directory: verification
        run: java -cp tla2tools.jar tla2sany.SANY HydraActivationCore.tla
      # Mutation steps assert the SPECIFIC expected invariant fires (smoke configs check the exact
      # conjunct, not the aggregate Inv). Absence of the expected violation FAILS the job — a
      # mutation that stopped firing must never pass green (masked-failure guard).
      - name: Mut2 must trip CaseBPure (label-only reset)
        working-directory: verification
        run: |
          rc=0
          java -cp tla2tools.jar tlc2.TLC -workers auto -deadlock \
            -config smoke/Mut2-CaseBPure.cfg HydraActivationCore.tla > mut2.log 2>&1 || rc=$?
          if grep -q "Invariant CaseBPure is violated" mut2.log; then
            echo "OK: Mut2 tripped CaseBPure (rc=$rc)"
          else
            echo "FAIL: Mut2 did NOT trip CaseBPure — the mutation stopped firing"; tail -40 mut2.log; exit 1
          fi
      - name: Mut4 must trip AbortFinality (no abort finality — TLC-1/I25)
        working-directory: verification
        run: |
          rc=0
          java -cp tla2tools.jar tlc2.TLC -workers auto -deadlock \
            -config smoke/Mut4-AbortFinality.cfg HydraActivationCore.tla > mut4.log 2>&1 || rc=$?
          if grep -q "Invariant AbortFinality is violated" mut4.log; then
            echo "OK: Mut4 tripped AbortFinality (rc=$rc)"
          else
            echo "FAIL: Mut4 did NOT trip AbortFinality — the mutation stopped firing"; tail -40 mut4.log; exit 1
          fi
      - name: Baseline-safety smoke must NOT violate (bounded time budget)
        working-directory: verification
        run: |
          rc=0
          timeout 240 java -cp tla2tools.jar tlc2.TLC -workers auto -deadlock \
            -config BaselineSafety.cfg HydraActivationCore.tla > base.log 2>&1 || rc=$?
          # Any violation/Error text fails the job regardless of rc — the gate must not lie.
          if grep -qE "is violated|Temporal properties were violated|^Error:" base.log; then
            echo "FAIL: baseline-safety surfaced a violation/error"; tail -60 base.log; exit 1
          fi
          # Exit-code discrimination: 124 = time-boxed (pass); 0 = bounded run completed clean (pass);
          # anything else = unexpected (fail).
          case "$rc" in
            124) echo "OK: baseline-safety time-boxed at 240s, no violation" ;;
            0)   echo "OK: baseline-safety bounded run completed, no violation" ;;
            *)   echo "FAIL: baseline-safety unexpected rc=$rc"; tail -60 base.log; exit 1 ;;
          esac

  # ---------- long, checkpointed, manual/weekly ----------
  long:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read          # required for cross-run artifact download (§7.15 -recover fix)
    timeout-minutes: 350   # ~5.8 h, under GitHub's 6 h ceiling
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: baseline-safety, cfg: BaselineSafety.cfg,   expect: clean }
          - { name: baseline-live,   cfg: BaselineLiveness.cfg, expect: clean }
          - { name: mut1,            cfg: Mut1Unservable.cfg,    expect: violation }
          - { name: mut3,            cfg: Mut3AttemptFence.cfg,  expect: violation }
          # §7.15/Q2 fast mutation lane: deliberately smaller SOUND bounds (MaxCrashes=1, MaxPos=1)
          # so the F2 fencing counterexample is shallow — a mutation check only needs the violation
          # to exist at SOME sound bounds. Paired with baseline-safety-fast at the IDENTICAL bounds
          # (must be clean) so a Mut3Fast fire is provably mutation-induced, not bound-induced.
          # These drain fast (well under the 320m box); no -recover needed.
          - { name: mut3-fast,          cfg: Mut3Fast.cfg,          expect: violation }
          - { name: baseline-safety-fast, cfg: BaselineSafetyFast.cfg, expect: clean }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - name: Fetch + verify tla2tools.jar
        working-directory: verification
        run: |
          curl -sSL -o tla2tools.jar "$TLA_URL"
          echo "$TLA_SHA256  tla2tools.jar" | sha256sum -c -
      - name: Restore prior checkpoint (if recovering)
        # §7.15 fix: download-artifact@v4 is CURRENT-run-scoped by default, so a fresh dispatch
        # cannot see a prior run's checkpoint — recover=true silently started fresh. Passing
        # run-id + github-token fetches the source run's artifact so -recover actually resumes.
        if: ${{ inputs.recover }}
        uses: actions/download-artifact@v4
        with:
          name: tlc-checkpoint-${{ matrix.name }}
          path: verification/states
          run-id: ${{ inputs.run_id || github.run_id }}
          github-token: ${{ github.token }}
        continue-on-error: true
      - name: Run ${{ matrix.name }} (checkpointed)
        working-directory: verification
        run: |
          mkdir -p ci-results states
          RECOVER=""
          if [ "${{ inputs.recover }}" = "true" ] && [ -d states ]; then
            CK=$(ls -dt states/*/ 2>/dev/null | head -1)
            [ -n "$CK" ] && RECOVER="-recover ${CK%/}"
          fi
          # §7.15: make the recover decision unambiguous in the log (rule 12 — observe the
          # round-trip: a resume must print TLC's own "Starting recovery from checkpoint" marker,
          # not this FRESH line). recover=true + FRESH here means the cross-run fetch still failed.
          if [ -n "$RECOVER" ]; then echo "RECOVER-DECISION: RESUMING from $RECOVER"; \
          elif [ "${{ inputs.recover }}" = "true" ]; then echo "RECOVER-DECISION: recover=true but NO checkpoint restored — FRESH (fetch failed)"; \
          else echo "RECOVER-DECISION: fresh run (recover not requested)"; fi
          # -checkpoint 60: snapshot every 60 min so a boundary loses at most ~1 h.
          # INNER time-box (`timeout 320m`, < the 350-min job timeout): a long config that will
          # not drain in one job must EXIT CLEANLY here (timeout rc 124, swallowed) so the Classify
          # and Upload steps still run and the checkpoint is preserved. Without this, the job-level
          # `timeout-minutes` cancels the job mid-run and `if: always()` never uploads — the
          # `-recover` chain then silently loses its checkpoint for exactly the slow jobs that need it.
          timeout 320m java -Xmx12g -cp tla2tools.jar tlc2.TLC -workers auto -deadlock -checkpoint 60 \
            $RECOVER -config ${{ matrix.cfg }} HydraActivationCore.tla > ci-results/${{ matrix.name }}.log 2>&1 || true
          tail -20 ci-results/${{ matrix.name }}.log
      - name: Classify result
        working-directory: verification
        run: |
          # Semantic classification (F-LIVENESS-FAIR hardening): assert the TLC OUTCOME per config;
          # NEVER map job-step success to GREEN. A results table may say GREEN only when this step
          # writes verdict=GREEN. Time-boxed exits are an explicit INCONCLUSIVE, not a pass.
          log=ci-results/${{ matrix.name }}.log
          violated=$(grep -cE "Invariant .* is violated|Temporal properties were violated" "$log" || true)
          complete=$(grep -cE "Model checking completed\. No error" "$log" || true)
          verdict=INCONCLUSIVE; rc=0
          if [ "${{ matrix.expect }}" = "violation" ]; then
            if [ "$violated" -ge 1 ]; then verdict=GREEN            # mutation fired as designed
            elif [ "$complete" -ge 1 ]; then verdict=MASKED-FAILURE; rc=1  # drained clean => mutation stopped firing
            fi
          else # expect = clean
            if [ "$violated" -ge 1 ]; then verdict=VIOLATION; rc=1  # a "clean" config that violates: surface loudly, never green
            elif [ "$complete" -ge 1 ]; then verdict=GREEN          # reached fixpoint / no error
            fi
          fi
          echo "config=${{ matrix.name }} expect=${{ matrix.expect }} violated=$violated complete=$complete verdict=$verdict" | tee ci-results/${{ matrix.name }}.status
          if [ "$verdict" = "INCONCLUSIVE" ]; then
            echo "INCONCLUSIVE (time-boxed) — checkpoint uploaded; re-dispatch recover=true to continue. NOT green."
          fi
          exit $rc
      - name: Upload checkpoint + log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tlc-checkpoint-${{ matrix.name }}
          path: |
            verification/states
            verification/ci-results/${{ matrix.name }}.log
            verification/ci-results/${{ matrix.name }}.status
          retention-days: 30
