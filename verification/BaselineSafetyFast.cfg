Stages = {s1, s2}
MaxEpoch = 1
MaxRId = 1
MaxAttempt = 2
MaxPos = 1
MaxCrashes = 1
EnableUnservable = TRUE
ResetTruncates = TRUE
AttemptFencing = TRUE
AbortGuardEnabled = TRUE

INVARIANTS
Inv
