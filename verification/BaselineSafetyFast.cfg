\* BaselineSafetyFast — the control for Mut3Fast: IDENTICAL bounds, AttemptFencing = TRUE.
\* Must drain CLEAN. This is what makes a Mut3Fast fire provably mutation-induced (the only
\* difference between the two configs is AttemptFencing) rather than an artifact of the smaller
\* bounds. Same HydraActivationCore.tla (untouched); differs from BaselineSafety.cfg only in
\* MaxCrashes (2 -> 1), matching Mut3Fast.
SPECIFICATION Spec

SYMMETRY Sym

CONSTRAINT
StateConstraint

