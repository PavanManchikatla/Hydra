\* Mut3Fast — the F2 attempt-fencing mutation (AttemptFencing = FALSE) at deliberately smaller
\* SOUND bounds so the stale-INITIAL-attempt counterexample is shallow and cheap to find.
\* Rationale (verification strategy, NOT model adjustment): a mutation check only needs the
\* designed violation to EXIST at some sound bounds; the full Mut3AttemptFence.cfg at MaxCrashes=2
\* never surfaced it in ~380M states (a deep-in-a-large-space problem, not a real-harm doubt — the
\* randomized sim catches the same sabotage at median 187 steps). Smaller bounds shrink the space.
\* MUST be paired with BaselineSafetyFast.cfg (identical bounds, AttemptFencing=TRUE, expect clean)
\* so a fire here is provably mutation-induced. Only bound-level CONSTANTS differ from the parent —
\* HydraActivationCore.tla is untouched (so run 29222085672's -recover checkpoints stay valid).
